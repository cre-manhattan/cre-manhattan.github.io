<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Manhattan CRE Prediction Engine</title>
    <script>
      // GitHub Pages SPA redirect
      // Converts the path to a query string so the SPA can handle routing
      var pathSegmentsToKeep = 1; // Keep 1 segment for GitHub Pages project sites
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
    Redirecting&hellip;
  </body>
</html>
